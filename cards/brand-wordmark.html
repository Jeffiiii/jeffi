<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;padding:28px 32px;font-family:var(--font-body);background:var(--white);display:flex;align-items:center;gap:48px}
 .marks{display:flex;flex-direction:column;gap:14px}
 .wm{font-family:var(--font-display);font-weight:900;font-size:2.4rem;letter-spacing:-.02em;line-height:1}
 .sub{font-family:var(--font-mono);font-size:11px;color:var(--text-muted)}
 .chip{display:inline-flex;align-self:flex-start;gap:8px;padding:7px 16px;border-radius:999px;background:var(--brand-gradient);color:#fff;font-family:var(--font-display);font-weight:800;font-size:.9rem;box-shadow:var(--shadow-glow)}
</style></head><body>
 <div class="marks">
  <div class="wm ds-gradient-text">Jeffi ✦</div>
  <div class="sub">personal site wordmark · gradient ink</div>
 </div>
 <div class="marks">
  <div class="wm" style="color:var(--brand)">Elysia ♪</div>
  <div class="sub">vtuber wordmark · Elysia pink</div>
 </div>
 <div class="marks">
  <span class="chip">♪ Elysia</span>
  <div class="sub">avatar chip lockup</div>
 </div>
</body></html>
