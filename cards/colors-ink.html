<!-- @dsCard group="Colors" viewport="700x150" name="Plum Ink — Text" subtitle="Deep plum carries all text; from the avatar's eyes" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--white);padding:18px;font-family:var(--font-body)}
 .row{display:flex;gap:10px}
 .sw{flex:1;height:96px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:9px;box-shadow:var(--shadow-xs)}
 .n{font-size:var(--fs-micro);font-weight:800;color:#fff}
 .h{font-family:var(--font-mono);font-size:10px;color:#fff;opacity:.85}
 .dk .n,.dk .h{color:var(--plum-900)}
</style></head><body>
<div class="row">
 <div class="sw" style="background:var(--plum-900)"><span class="n">ink 900</span><span class="h">#3a1f38</span></div>
 <div class="sw" style="background:var(--plum-700)"><span class="n">body 700</span><span class="h">#5b2a4a</span></div>
 <div class="sw" style="background:var(--plum-600)"><span class="n">600</span><span class="h">#7a4d6e</span></div>
 <div class="sw" style="background:var(--plum-500)"><span class="n">muted 500</span><span class="h">#9a6f90</span></div>
 <div class="sw dk" style="background:var(--plum-400)"><span class="n">faint 400</span><span class="h">#b89bb0</span></div>
</div>
</body></html>
