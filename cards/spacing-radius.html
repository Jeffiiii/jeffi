<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--white);padding:22px;font-family:var(--font-body)}
 .row{display:flex;gap:14px;align-items:flex-end}
 .c{display:flex;flex-direction:column;align-items:center;gap:7px}
 .b{width:74px;height:62px;background:var(--brand-soft);border:1.5px solid var(--brand)}
 .l{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head><body>
<div class="row">
 <div class="c"><div class="b" style="border-radius:var(--radius-sm)"></div><span class="l">sm 12</span></div>
 <div class="c"><div class="b" style="border-radius:var(--radius-md)"></div><span class="l">md 16</span></div>
 <div class="c"><div class="b" style="border-radius:var(--radius-lg)"></div><span class="l">lg 20</span></div>
 <div class="c"><div class="b" style="border-radius:var(--radius-xl)"></div><span class="l">xl 28</span></div>
 <div class="c"><div class="b" style="border-radius:var(--radius-2xl)"></div><span class="l">2xl 36</span></div>
 <div class="c"><div class="b" style="width:110px;border-radius:var(--radius-pill)"></div><span class="l">pill 999</span></div>
</div>
</body></html>
