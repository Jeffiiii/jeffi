<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--white);padding:18px;font-family:var(--font-body)}
 .row{display:flex;gap:10px}
 .sw{flex:1;height:96px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:space-between;padding:9px;box-shadow:var(--shadow-xs)}
 .e{font-size:1.4rem}
 .n{font-size:var(--fs-micro);font-weight:800;color:#fff}
</style></head><body>
<div class="row">
 <div class="sw" style="background:var(--emo-happy)"><span class="e">😊</span><span class="n">happy</span></div>
 <div class="sw" style="background:var(--emo-playful)"><span class="e">😏</span><span class="n">playful</span></div>
 <div class="sw" style="background:var(--emo-shy)"><span class="e">☺️</span><span class="n">shy</span></div>
 <div class="sw" style="background:var(--emo-sad)"><span class="e">🥺</span><span class="n">sad</span></div>
 <div class="sw" style="background:var(--emo-surprised)"><span class="e">😮</span><span class="n">surprised</span></div>
 <div class="sw" style="background:var(--emo-neutral)"><span class="e">🌸</span><span class="n">neutral</span></div>
</div>
</body></html>
