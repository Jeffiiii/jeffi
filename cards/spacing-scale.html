<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--white);padding:22px;font-family:var(--font-body)}
 .row{display:flex;align-items:flex-end;gap:14px}
 .c{display:flex;flex-direction:column;align-items:center;gap:6px}
 .b{background:var(--brand-gradient);border-radius:4px}
 .l{font-family:var(--font-mono);font-size:10px;color:var(--text-muted)}
</style></head><body>
<div class="row">
 <div class="c"><div class="b" style="width:4px;height:4px"></div><span class="l">1·4</span></div>
 <div class="c"><div class="b" style="width:8px;height:8px"></div><span class="l">2·8</span></div>
 <div class="c"><div class="b" style="width:12px;height:12px"></div><span class="l">3·12</span></div>
 <div class="c"><div class="b" style="width:16px;height:16px"></div><span class="l">4·16</span></div>
 <div class="c"><div class="b" style="width:24px;height:24px"></div><span class="l">6·24</span></div>
 <div class="c"><div class="b" style="width:32px;height:32px"></div><span class="l">8·32</span></div>
 <div class="c"><div class="b" style="width:48px;height:48px"></div><span class="l">12·48</span></div>
 <div class="c"><div class="b" style="width:64px;height:64px"></div><span class="l">16·64</span></div>
 <div class="c"><div class="b" style="width:80px;height:80px"></div><span class="l">20·80</span></div>
</div>
</body></html>
