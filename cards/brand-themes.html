<!-- @dsCard group="Brand" viewport="700x210" name="Themes — Dark hub & Light pastel" subtitle="Site flips via :root[data-theme]; same Elysia pink accent" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;padding:18px;font-family:var(--font-body);display:flex;gap:16px}
 .panel{flex:1;border-radius:var(--radius-xl);overflow:hidden;border:1px solid var(--border-card);box-shadow:var(--shadow-md)}
 .top{padding:11px 14px;display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:900;font-size:1rem}
 .body{padding:14px;display:flex;flex-direction:column;gap:8px}
 .card{border-radius:var(--radius-md);padding:11px 13px;font-size:.8rem;font-weight:700}
 .pill{align-self:flex-start;padding:4px 12px;border-radius:999px;font-size:.7rem;font-weight:800;color:#fff;background:var(--brand-gradient)}
 /* dark panel */
 .dark{background:var(--night-900)}
 .dark .top{color:#fff;border-bottom:1px solid rgba(255,255,255,.08)}
 .dark .top span{color:var(--elysia-400)}
 .dark .card{background:var(--glass-bg-dark);color:rgba(255,233,244,.7);border:1px solid rgba(255,255,255,.1)}
 /* light panel */
 .light{background:var(--bg-page-grad)}
 .light .top{color:var(--plum-900);border-bottom:1px solid var(--border-card)}
 .light .top span{color:var(--elysia-600)}
 .light .card{background:var(--surface-card);color:var(--plum-600);border:1px solid var(--border-card);backdrop-filter:var(--glass-blur)}
 .lbl{font-family:var(--font-mono);font-size:9px;opacity:.6;margin-top:2px}
</style></head><body>
 <div class="panel dark"><div class="top">Jeffi <span>✦</span><span class="pill" style="margin-left:auto">Elysia ♪</span></div>
  <div class="body"><div class="card">Dark plum hub — default (laplace-style)</div><div class="card">music · gallery · skills</div><div class="lbl" style="color:#fff">data-theme: dark</div></div></div>
 <div class="panel light"><div class="top">Jeffi <span>✦</span><span class="pill" style="margin-left:auto">Elysia ♪</span></div>
  <div class="body"><div class="card">Light pastel — toggle option</div><div class="card">music · gallery · skills</div><div class="lbl" style="color:var(--plum-700)">data-theme: light</div></div></div>
</body></html>
