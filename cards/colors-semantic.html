<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & Surfaces" subtitle="Status colours + page / card / night surfaces" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--white);padding:18px;font-family:var(--font-body)}
 .row{display:flex;gap:10px}
 .sw{flex:1;height:96px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:9px;box-shadow:var(--shadow-xs);border:1px solid var(--border-soft)}
 .n{font-size:var(--fs-micro);font-weight:800}
 .w{color:#fff}.d{color:var(--plum-900)}
</style></head><body>
<div class="row">
 <div class="sw w" style="background:var(--success)"><span class="n">success</span></div>
 <div class="sw w" style="background:var(--warning)"><span class="n">warning</span></div>
 <div class="sw w" style="background:var(--danger)"><span class="n">danger</span></div>
 <div class="sw w" style="background:var(--info)"><span class="n">info</span></div>
 <div class="sw d" style="background:var(--pearl)"><span class="n">pearl page</span></div>
 <div class="sw d" style="background:var(--cloud)"><span class="n">cloud surface</span></div>
 <div class="sw w" style="background:var(--night-800)"><span class="n">night 800</span></div>
</div>
</body></html>
