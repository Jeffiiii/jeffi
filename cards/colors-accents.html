<!-- @dsCard group="Colors" viewport="700x150" name="Accents — Lilac · Lavender · Mint · Crystal · Gold" subtitle="Canonical Elysia lilac #9f7ae4 + supporting hues" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--white);padding:18px;font-family:var(--font-body)}
 .row{display:flex;gap:10px}
 .sw{flex:1;height:96px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:9px;box-shadow:var(--shadow-xs)}
 .n{font-size:var(--fs-micro);font-weight:800;color:var(--plum-900)}
 .h{font-family:var(--font-mono);font-size:10px;color:var(--plum-800);opacity:.8}
</style></head><body>
<div class="row">
 <div class="sw" style="background:var(--elysia-lilac)"><span class="n" style="color:#fff">elysia lilac</span><span class="h" style="color:#fff">#9f7ae4</span></div>
 <div class="sw" style="background:var(--lavender)"><span class="n">lavender</span><span class="h">#c4a8e8</span></div>
 <div class="sw" style="background:var(--mint)"><span class="n">mint</span><span class="h">#a8ddd0</span></div>
 <div class="sw" style="background:var(--crystal)"><span class="n">crystal</span><span class="h">#8fd3e8</span></div>
 <div class="sw" style="background:var(--gold)"><span class="n">gold</span><span class="h">#ffe4a0</span></div>
</div>
</body></html>
