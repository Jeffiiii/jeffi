<!-- @dsCard group="Colors" viewport="700x150" name="Elysia Pink — Primary" subtitle="Signature magenta #d6337a + sakura ramp, from her avatar" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
 body{margin:0;background:var(--white);padding:18px;font-family:var(--font-body)}
 .row{display:flex;gap:10px}
 .sw{flex:1;height:96px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:9px;box-shadow:var(--shadow-xs)}
 .n{font-size:var(--fs-micro);font-weight:800;color:#fff;opacity:.95}
 .h{font-family:var(--font-mono);font-size:10px;color:#fff;opacity:.85}
 .dk .n,.dk .h{color:var(--plum-900)}
</style></head><body>
<div class="row">
 <div class="sw dk" style="background:var(--elysia-200)"><span class="n">petal 200</span><span class="h">#ffd9ec</span></div>
 <div class="sw dk" style="background:var(--elysia-300)"><span class="n">sakura 300</span><span class="h">#ff9ecb</span></div>
 <div class="sw" style="background:var(--elysia-500)"><span class="n">500</span><span class="h">#f25a9e</span></div>
 <div class="sw" style="background:var(--elysia-600);outline:2px solid var(--plum-900);outline-offset:2px"><span class="n">★ primary 600</span><span class="h">#d6337a</span></div>
 <div class="sw" style="background:var(--elysia-700)"><span class="n">700</span><span class="h">#b62268</span></div>
 <div class="sw" style="background:var(--elysia-900)"><span class="n">plum 900</span><span class="h">#5b2a4a</span></div>
</div>
</body></html>
